---
# tasks file for firewall_setup

- name: Validate port
  ansible.builtin.assert:
    that:
      - firewall_setup_port_to_open >= 0
      - firewall_setup_port_to_open <= 65535
    fail_msg: "Port is not valid"

- name: Firewalld for RHEL-based systems
  when: ansible_facts.os_family == "RedHat"
  block:
    - name: Ensure firewalld is installed (or install if not)
      ansible.builtin.dnf:
        name: firewalld
        state: present

    - name: Open port tcp in firewalld
      ansible.builtin.firewalld:
        port: "{{ firewall_setup_port_to_open }}/tcp"
        permanent: true
        immediate: true
        state: enabled

- name: Ufw for debian-based systems
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Install ufw
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Open stock ssh port tcp in ufw
      ansible.builtin.ufw:
        rule: allow
        port: 22
        proto: tcp
        state: enabled

    - name: Open port tcp in ufw
      ansible.builtin.ufw:
        rule: allow
        port: "{{ firewall_setup_port_to_open }}"
        proto: tcp
        state: enabled

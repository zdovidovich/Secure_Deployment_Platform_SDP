---
# tasks file for fail2ban_install
- name: Install fail2ban (Debian-based systems)
  ansible.builtin.apt:
    name: fail2ban
    state: present
  when: ansible_facts.os_family == "Debian"

- name: Install fail2ban (RHEL-based systems)
  ansible.builtin.dnf:
    name: fail2ban
    state: present
  when: ansible_facts.os_family == "RedHat"

- name: Enable fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: Create local jail
  ansible.builtin.copy:
    content: ''
    dest: /etc/fail2ban/jail.local
    force: false
    mode: "0644"
    owner: root
    group: root

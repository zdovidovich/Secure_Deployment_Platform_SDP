---
# tasks file for update_repos
- name: Update repos (RHEL-based)
  yum: 
    name: epel-release
  when: ansible_facts.os_family == "RedHat" and ansible_facts.distribution != "Fedora"
  ignore_errors: true

- name: Update repos (Debian-based)
  apt:
    update_cache: true
  when: ansible_facts.os_family == "Debian"
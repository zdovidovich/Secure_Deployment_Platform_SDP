version: '3.8'

services:
  # Redis для Celery broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API сервер (FastAPI)
  api:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./deployments.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - UPLOAD_DIR=/tmp/sdp_uploads
      - TRIVY_PATH=trivy
      - HADOLINT_PATH=hadolint
      - ANSIBLE_BASE_DIR=/app/ansible
    volumes:
      - ./api-server:/app
      - ./ansible:/app/ansible:ro
      - uploads:/tmp/sdp_uploads
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  worker:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./deployments.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - UPLOAD_DIR=/tmp/sdp_uploads
      - TRIVY_PATH=trivy
      - HADOLINT_PATH=hadolint
      - ANSIBLE_BASE_DIR=/app/ansible
    volumes:
      - ./api-server:/app
      - ./ansible:/app/ansible:ro
      - ./app:/app/app:ro  # Оригинальные библиотеки
      - uploads:/tmp/sdp_uploads
      - /var/run/docker.sock:/var/run/docker.sock  # Для работы с Docker
    depends_on:
      - api
      - redis
    command: celery -A worker.celery_app worker --loglevel=info -Q deployments -c 2

  # Frontend (Flask) - опционально
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://api:8000/api/v1
    volumes:
      - ./frontend:/app
    depends_on:
      - api
    command: python app/app.py

volumes:
  redis_data:
  uploads:
